<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Contar — Gabby's Dollhouse</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#2d1b4e;font-family:'Baloo 2','Comic Sans MS','Chalkboard SE',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100dvh;overflow:hidden;user-select:none}
  .game{width:100vw;height:100dvh;max-width:600px;background:linear-gradient(180deg,#6c5ce7 0%,#a55eea 45%,#fd79a8 100%);display:flex;flex-direction:column;position:relative;overflow:hidden}
  .header{text-align:center;padding:6px 12px 2px;flex-shrink:0;display:flex;justify-content:space-between;color:rgba(255,255,255,0.85);font-size:clamp(11px,2.5vw,13px);font-weight:700}
  .header .score{color:#ffe259;font-weight:800}

  /* Path */
  .path-container{position:relative;width:100%;flex-shrink:0;height:clamp(56px,15vw,84px);margin:2px auto;padding:0 8px}
  .path-container svg{width:100%;height:100%;display:block}
  .path-dot{position:absolute;width:clamp(40px,10vw,60px);height:clamp(40px,10vw,60px);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 0 10px rgba(0,0,0,0.3)}
  .path-dot .dot-img{width:80%;height:80%;object-fit:contain;border-radius:50%}
  .path-dot .dot-icon{font-size:clamp(18px,4.5vw,28px)}
  .path-dot.active{border:3px solid #f1c40f;box-shadow:0 0 20px rgba(241,196,15,0.5);transform:scale(1.1)}
  .path-dot.done{border:3px solid #4ecca3;box-shadow:0 0 15px rgba(78,204,163,0.4)}
  .progress{display:flex;justify-content:center;gap:6px;padding:4px 12px;flex-shrink:0}
  .step{width:clamp(22px,5vw,36px);height:clamp(22px,5vw,36px);border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);color:#fff;display:flex;align-items:center;justify-content:center;font-size:clamp(10px,2.2vw,16px);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1)}
  .step.active{background:#ffe259;border-color:#ffe259;color:#5b3a00;font-weight:800;transform:scale(1.1)}
  .step.done{background:#55efc4;border-color:#55efc4;color:#0a6b4f}
  
  .quest{display:flex;align-items:center;justify-content:center;gap:8px;padding:2px 12px;flex-shrink:0;font-size:clamp(12px,2.5vw,15px);color:#ffe259;text-align:center;font-weight:700}
  .quest-icon{font-size:clamp(20px,4vw,28px)}
  
  .arena{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:4px 8px;position:relative}
  .char-banner{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .char-banner img{width:clamp(40px,9vw,60px);height:clamp(40px,9vw,60px);object-fit:contain;border-radius:10px;background:rgba(255,255,255,0.05)}
  .char-banner .name{font-size:clamp(14px,3vw,20px);font-weight:700;color:#fff}
  .question{color:#ffe259;font-size:clamp(14px,3.2vw,18px);font-weight:800;margin-bottom:6px;text-align:center;text-shadow:0 2px 0 rgba(0,0,0,0.15)}
  .char-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(3px,1vw,8px);padding:6px;max-height:50%;overflow-y:auto}
  .char-grid .char{width:clamp(38px,8vw,60px);height:clamp(38px,8vw,60px);object-fit:contain;animation:popIn 0.3s ease;background:rgba(255,255,255,0.18);border-radius:8px;padding:3px}
  @keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
  
  .options{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(6px,2vw,10px);padding:6px 16px 12px;flex-shrink:0}
  .opt{padding:clamp(12px,2.5vw,18px);border-radius:20px;border:4px solid transparent;background:#fff;color:#6c5ce7;font-size:clamp(20px,5vw,34px);font-weight:800;text-align:center;cursor:pointer;transition:all 0.15s;box-shadow:0 5px 0 rgba(0,0,0,0.15)}
  .opt:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,0.15)}
  .opt.correct{border-color:#00b894;background:#e0fff3;animation:correctPulse 0.4s ease}
  .opt.wrong{border-color:#d63031;background:#ffe3e3;animation:shake 0.35s ease}
  @keyframes correctPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  
  .feedback{text-align:center;padding:2px 12px;min-height:20px;flex-shrink:0;font-size:clamp(13px,2.8vw,18px);font-weight:800;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,0.15)}
  .feedback.ok{color:#a9ffd9}.feedback.fail{color:#ffe0e0}
  
  /* Celebration overlay */
  .celebrate{position:absolute;inset:0;z-index:100;background:linear-gradient(180deg,#6c5ce7 0%,#a55eea 45%,#fd79a8 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:opacity 0.5s;padding:30px;text-align:center}
  .celebrate.active{opacity:1;pointer-events:all}
  .celebrate h2{font-size:clamp(24px,7vw,42px);color:#fff;font-weight:800;text-shadow:0 3px 0 rgba(0,0,0,0.18);margin-bottom:4px}
  .celebrate .sub{color:#fff;font-weight:700;font-size:clamp(16px,3.5vw,24px);margin-bottom:4px}
  .celebrate .detail{color:rgba(255,255,255,0.85);font-weight:600;font-size:clamp(12px,2.5vw,16px)}
  .celebrate .big-img{width:clamp(80px,18vw,130px);height:clamp(80px,18vw,130px);object-fit:contain;margin:8px 0;border-radius:16px}
  .celebrate .obj-icon{font-size:clamp(36px,9vw,60px);margin:4px 0}
  .celebrate button{padding:14px 36px;font-size:clamp(16px,4vw,22px);font-weight:800;font-family:inherit;background:linear-gradient(180deg,#ffe259,#ffa751);color:#5b3a00;border:none;border-radius:999px;cursor:pointer;margin-top:12px;box-shadow:0 5px 0 #d9820f;letter-spacing:1px}
  
  .start-overlay{position:absolute;inset:0;z-index:200;background:rgba(15,52,96,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;text-align:center;transition:opacity 0.5s}
  .start-overlay.hidden{opacity:0;pointer-events:none}
  .start-overlay .start-btn{padding:16px 48px;font-size:clamp(18px,4vw,24px);font-weight:700;background:linear-gradient(135deg,#f1c40f,#f39c12);color:#1a1a2e;border:none;border-radius:16px;cursor:pointer;letter-spacing:2px;margin-top:16px}

  /* Confetti */
  .confetti-container{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:150}
  .conf{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

  /* ===== Mobile kid-size boost ===== */
  @media (max-width:600px){
    .header{font-size:clamp(13px,3.8vw,16px);padding:8px 14px 4px}
    .question{font-size:clamp(19px,5.5vw,26px);margin-bottom:8px}
    .char-grid{gap:clamp(6px,2.5vw,10px);max-height:none;padding:8px}
    .char-grid .char{width:clamp(54px,15vw,84px);height:clamp(54px,15vw,84px);border-radius:12px;padding:4px}
    .options{gap:clamp(10px,3vw,14px);padding:8px 14px 16px}
    .opt{font-size:clamp(30px,9vw,46px);padding:clamp(16px,4.5vw,26px);border-radius:18px;border-width:4px}
    .feedback{font-size:clamp(16px,4.2vw,22px);min-height:26px;padding:4px 12px}
    .celebrate h2{font-size:clamp(30px,9vw,46px)}
    .celebrate .sub{font-size:clamp(18px,5vw,26px)}
    .celebrate .big-img{width:clamp(110px,28vw,160px);height:clamp(110px,28vw,160px)}
    .celebrate .obj-icon{font-size:clamp(48px,13vw,72px)}
    .celebrate button{font-size:clamp(18px,5vw,24px);padding:16px 40px;border-radius:999px}
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
/* ===== Shared kid menu style ===== */
.start-overlay,.win-overlay,.overlay,.setup-screen{background:linear-gradient(180deg,#6c5ce7 0%,#a55eea 45%,#fd79a8 100%)!important;font-family:'Baloo 2','Comic Sans MS','Chalkboard SE',system-ui,sans-serif!important}
.start-overlay h1,.start-overlay h2,.win-overlay h1,.win-overlay h2,.overlay h2,.setup-screen h1,.setup-screen h2{color:#fff!important;font-weight:800!important;font-family:'Baloo 2','Comic Sans MS','Chalkboard SE',system-ui,sans-serif!important;text-shadow:0 3px 0 rgba(0,0,0,0.18)!important;letter-spacing:1px!important}
.start-overlay p,.win-overlay .sub,.win-overlay .stats,.win-overlay .phrase-read,.overlay .sub,.overlay .final-label,.overlay .final-score,.setup-screen p{color:rgba(255,255,255,0.92)!important;font-weight:600!important;text-shadow:0 2px 0 rgba(0,0,0,0.12)!important}
.start-overlay .logo{animation:menuBob 2.2s ease-in-out infinite}
.start-overlay img,.win-overlay .reward-img,.win-overlay .win-chars img{filter:drop-shadow(0 6px 10px rgba(0,0,0,0.3))}
@keyframes menuBob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.start-btn,.start-overlay button,.win-overlay button,.overlay button,.setup-screen button{border-radius:999px!important;font-family:'Baloo 2','Comic Sans MS','Chalkboard SE',system-ui,sans-serif!important;font-weight:800!important;font-size:clamp(20px,5vw,28px)!important;padding:16px 46px!important;color:#5b3a00!important;background:linear-gradient(180deg,#ffe259,#ffa751)!important;border:none!important;box-shadow:0 7px 0 #d9820f,0 12px 24px rgba(0,0,0,0.25)!important;letter-spacing:1px!important;cursor:pointer!important;text-transform:none!important}
.start-btn:active,.start-overlay button:active,.win-overlay button:active,.overlay button:active,.setup-screen button:active{transform:translateY(4px)!important;box-shadow:0 2px 0 #d9820f!important}
.start-overlay .back-btn,.win-overlay .back-btn{background:rgba(255,255,255,0.22)!important;color:#fff!important;box-shadow:0 4px 0 rgba(0,0,0,0.2)!important;font-size:clamp(14px,3.5vw,18px)!important;padding:12px 28px!important}
.start-overlay .setting-row span{color:#fff!important;font-weight:700!important;text-shadow:0 2px 0 rgba(0,0,0,0.12)!important}
.start-overlay .size-btn{border-radius:14px!important;border:3px solid rgba(255,255,255,0.4)!important;background:rgba(255,255,255,0.16)!important;color:#fff!important;font-weight:800!important;font-family:inherit!important}
.start-overlay .size-btn.active{border-color:#ffe259!important;background:rgba(255,226,89,0.35)!important;color:#5b3a00!important}
.start-overlay .toggle{border:3px solid rgba(255,255,255,0.4)!important;background:rgba(255,255,255,0.25)!important}
.start-overlay .toggle.active{background:#55efc4!important;border-color:#2fd4a7!important}
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <span>🏠 Gabby's Dollhouse</span>
    <span class="score" id="scoreDisplay">0 ⭐</span>
    <span id="phaseLabel" style="color:#f1c40f;font-size:clamp(10px,2vw,13px)">0-9</span>
  </div>
  
  <div class="path-container" id="pathContainer">
    <svg viewBox="0 0 320 70" preserveAspectRatio="xMidYMid meet">
      <path id="pathTrack" d="M25,38 Q75,14 130,36 Q185,58 240,36 Q272,20 295,32" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="6" stroke-linecap="round"/>
      <path id="pathProgress" d="M25,38 Q75,14 130,36 Q185,58 240,36 Q272,20 295,32" fill="none" stroke="#55efc4" stroke-width="6" stroke-linecap="round" stroke-dasharray="300" stroke-dashoffset="300"/>
      <circle cx="93" cy="26" r="14" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="2" id="svgWp1"/>
      <text x="93" y="32" text-anchor="middle" font-size="14" fill="#fff">⭐</text>
      <circle cx="160" cy="45" r="14" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="2" id="svgWp2"/>
      <text x="160" y="51" text-anchor="middle" font-size="14" fill="#fff">⭐</text>
      <circle cx="228" cy="40" r="14" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="2" id="svgWp3"/>
      <text x="228" y="46" text-anchor="middle" font-size="14" fill="#fff">⭐</text>
      <circle cx="295" cy="32" r="14" fill="none" stroke="none" id="svgWp4"/>
      <text x="295" y="40" text-anchor="middle" font-size="24" id="goalIcon">👑</text>
      <g id="charGroup" style="transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1)">
        <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,0.9)" stroke="#ffe259" stroke-width="3" id="charGlow"/>
        <image id="pathCharImg" x="-16" y="-16" width="32" height="32" preserveAspectRatio="xMidYMid meet" href=""/>
      </g>
    </svg>
  </div>
  <div class="arena" id="arena">
    <div class="question" id="questionText">Quantos amigos vês?</div>
    <div class="char-grid" id="charGrid"></div>
  </div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  
  <div class="celebrate" id="celebrateOverlay">
    <div class="obj-icon" id="objIcon">🎯</div>
    <h2 id="celebrateTitle">Conseguiste!</h2>
    <div class="sub" id="celebrateSub">Ajudaste a chegar ao objetivo!</div>
    <img class="big-img" id="celebrateImg" src="" alt="">
    <div class="detail" id="celebrateDetail"></div>
    <button id="celebrateBtn" onclick="nextChar()">Continuar →</button>
  </div>
  
  <div class="win-overlay" id="winOverlay" style="position:absolute;inset:0;z-index:200;background:rgba(15,52,96,0.93);display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:opacity 0.5s;padding:30px;text-align:center">
    <h2 style="font-size:clamp(28px,8vw,48px);color:#4ecca3">🏆 Parabéns!</h2>
    <div style="color:#aaa;font-size:clamp(14px,3vw,18px);margin:8px 0">Ajudaste todos os amigos!</div>
    <button onclick="startGame()" style="padding:12px 36px;font-size:clamp(14px,3vw,18px);font-weight:700;background:#4ecca3;color:#1a1a2e;border:none;border-radius:12px;cursor:pointer;margin-top:12px">Jogar outra vez →</button>
    <div id="winOverlay.active" style="opacity:1;pointer-events:all"></div>
  </div>
  
  <div class="start-overlay" id="startOverlay">
    <img src="assets/icon.png" style="width:clamp(60px,16vw,120px);height:clamp(60px,16vw,120px);border-radius:16px;margin-bottom:8px">
    <h2>Contar</h2>
    <p>Ajuda os amigos da Gabby a chegar ao seu objetivo!</p>
    <button class="start-btn" onclick="startGame()">▶ COMEÇAR</button>
  </div>
</div>
<script>
const CHARS = [
  {file:'gabby.png',name:'Gabby',goal:'às suas tiaras 👑',goalIcon:'👑'},
  {file:'pandy.png',name:'Pandy Paws',goal:'aos seus sapatos de dança 🩰',goalIcon:'🩰'},
  {file:'kitty_fairy.png',name:'Kitty Fairy',goal:'ao seu jardim mágico 🌸',goalIcon:'🌸'},
  {file:'pillow_cat.png',name:'Pillow Cat',goal:'às suas almofadas 🛏️',goalIcon:'🛏️'},
  {file:'baby_box.png',name:'Baby Box',goal:'aos seus brinquedos 🎁',goalIcon:'🎁'},
];
const STEPS = 4;
// Waypoint positions in SVG coordinates (320x70 viewBox, horizontal path)
const WAYPOINTS = [
  {x:25, y:38},
  {x:93, y:26},
  {x:160, y:45},
  {x:228, y:40},
  {x:295, y:32},
];

let score=0,charIdx=0,charProgress=0,audioInit=false,audioCtx=null;
let currentCount=0,correctAnswer=0,phase=1; // phase 1: 0-9, phase 2: 0-20

function initAudio(){if(audioInit)return;audioInit=true;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}catch(e){}}

function speak(text,lang,cb){
  if(!window.speechSynthesis){if(cb)cb();return}
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lang||'pt-PT';u.rate=0.85;
  if(cb)u.onend=cb;
  window.speechSynthesis.speak(u);
}

function sfxCorrect(){try{if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.setValueAtTime(523,audioCtx.currentTime);o.frequency.linearRampToValueAtTime(784,audioCtx.currentTime+0.15);g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.2)}catch(e){}}
function sfxWrong(){try{if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.value=180;g.gain.setValueAtTime(0.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.2)}catch(e){}}
function sfxCelebrate(){try{if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.setValueAtTime(523,audioCtx.currentTime);o.frequency.linearRampToValueAtTime(659,audioCtx.currentTime+0.15);o.frequency.linearRampToValueAtTime(784,audioCtx.currentTime+0.3);o.frequency.linearRampToValueAtTime(1047,audioCtx.currentTime+0.5);g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.7);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.7)}catch(e){}}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}

function confetti(){
  var container=document.createElement('div');
  container.className='confetti-container';
  document.querySelector('.game').appendChild(container);
  var colors=['#f1c40f','#e74c3c','#4ecca3','#3498db','#9b59b6','#e67e22','#1abc9c'];
  for(var i=0;i<60;i++){
    var c=document.createElement('div');
    c.className='conf';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(4+Math.random()*8)+'px';
    c.style.height=(4+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>0.5?'50%':'2px';
    c.style.animationDuration=(1.5+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*1.5)+'s';
    container.appendChild(c);
  }
  setTimeout(function(){container.remove()},5000);
}

function startGame(){
  initAudio();
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('winOverlay').style.opacity='0';
  document.getElementById('winOverlay').style.pointerEvents='none';
  score=0;charIdx=0;charProgress=0;
  document.getElementById('scoreDisplay').textContent='0 ⭐';
  loadChar();
}

function loadChar(){
  var c=CHARS[charIdx];
  if(!c){gameWin();return}
  charProgress=0;
  document.getElementById('pathCharImg').setAttribute('href', 'assets/'+c.file);
  document.getElementById('goalIcon').textContent=c.goalIcon;
  document.getElementById('celebrateOverlay').classList.remove('active');
  document.getElementById('charGroup').setAttribute('transform', 'translate('+WAYPOINTS[0].x+','+WAYPOINTS[0].y+')');
  updateProgress();
  loadRound();
}

function updateProgress(){
  // Move character along the path to next waypoint
  var wp=WAYPOINTS[charProgress]||WAYPOINTS[0];
  document.getElementById('charGroup').setAttribute('transform', 'translate('+wp.x+','+wp.y+')');
  
  // Update the progress path
  var totalLen=document.getElementById('pathProgress').getTotalLength();
  var pct=charProgress/STEPS;
  document.getElementById('pathProgress').style.strokeDashoffset=totalLen-(totalLen*pct);
}

function loadRound(){
  var c=CHARS[charIdx];
  var maxNum=phase===1?9:20;
  currentCount=Math.floor(Math.random()*(maxNum+1));
  correctAnswer=currentCount;
  
  document.getElementById('questionText').textContent='Quantos '+c.name+' vês?';
  speak('Quantos '+c.name+' vês?','pt-PT');
  
  var grid=document.getElementById('charGrid');
  grid.innerHTML='';
  for(var i=0;i<currentCount;i++){
    var img=document.createElement('img');
    img.className='char';
    img.src='assets/'+c.file;
    img.style.animationDelay=(i*0.05)+'s';
    grid.appendChild(img);
  }
  
  var opts=[currentCount];
  while(opts.length<4){var r=Math.floor(Math.random()*(maxNum+1));if(!opts.includes(r))opts.push(r)}
  opts=shuffle(opts);
  
  var optDiv=document.getElementById('options');
  optDiv.innerHTML='';
  opts.forEach(function(n){
    var div=document.createElement('div');
    div.className='opt';
    div.textContent=n;
    div.dataset.value=n;
    div.addEventListener('click',function(){checkAnswer(parseInt(this.dataset.value));});
    optDiv.appendChild(div);
  });
  
  document.getElementById('feedback').textContent='';
}

function checkAnswer(selected){
  var opts=document.querySelectorAll('.opt');
  var chosen=null;
  opts.forEach(function(o){if(parseInt(o.dataset.value)===selected)chosen=o});
  if(!chosen)return;
  
  if(selected===correctAnswer){
    sfxCorrect();
    score++;
    charProgress++;
    document.getElementById('scoreDisplay').textContent=score+' ⭐';
    document.getElementById('feedback').textContent='✅ '+correctAnswer+'!';
    document.getElementById('feedback').className='feedback ok';
    chosen.classList.add('correct');
    updateProgress();
    
    if(charProgress>=STEPS){
      showCelebration();
    }else{
      speak(correctAnswer.toString(),'pt-PT');
      setTimeout(loadRound,1200);
    }
  }else{
    sfxWrong();
    chosen.classList.add('wrong');
    document.getElementById('feedback').textContent='❌ Tenta outra vez!';
    document.getElementById('feedback').className='feedback fail';
    setTimeout(function(){chosen.classList.remove('wrong')},400);
  }
}

function showCelebration(){
  sfxCelebrate();
  var c=CHARS[charIdx];
  document.getElementById('objIcon').textContent=c.goalIcon;
  document.getElementById('celebrateTitle').textContent=c.name+' conseguiu!';
  document.getElementById('celebrateSub').textContent=c.name+' chegou '+c.goal;
  document.getElementById('celebrateImg').src='assets/'+c.file;
  document.getElementById('celebrateDetail').textContent='⭐ '+score+' estrelas até agora!';
  document.getElementById('celebrateOverlay').classList.add('active');
  speak(c.name+' conseguiu! Chegou '+c.goal,'pt-PT');
  confetti();
}

function nextChar(){
  charIdx++;
  if(charIdx>=CHARS.length){
    if(phase===1){
      phase=2;
      charIdx=0;
      document.getElementById('celebrateOverlay').classList.remove('active');
      document.getElementById('phaseLabel').textContent='0-20 ⭐';
      loadChar();
      speak('Muito bem! Agora até 20!','pt-PT');
      return;
    }
    gameWin();
    return
  }
  document.getElementById('celebrateOverlay').classList.remove('active');
  loadChar();
}

function gameWin(){
  document.getElementById('winOverlay').style.opacity='1';
  document.getElementById('winOverlay').style.pointerEvents='all';
  speak('Parabéns! Ajudaste todos os amigos!','pt-PT');
  confetti();
}

function restartGame(){startGame()}
</script>
</body>
</html>
